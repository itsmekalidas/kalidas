<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gallery</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-image: url(bg2.jpg);
        }

        header {
            background-image: url(bg3.jpg);
            color:black;
            text-align: center;
            padding: 15px;
        }

        /* GALLERY GRID */
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 images per row */
            gap: 15px;
            padding: 20px;
            max-width: 900px;
            margin: auto;
        }

        .gallery img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<header>
    <h1>Gallery</h1>
</header>

<div class="gallery">
    <img src="g1.webp">
    <img src="g2.jpeg">
    <img src="g3.jpeg">
    <img src="g4.jpeg">
    <img src="g5.jpeg">
    <img src="g7.jpeg">
    <img src="g8.jpeg">
    <img src="g10.jpeg">
    <img src="g11.jpeg">
    <img src="g12.jpeg">
    <img src="g13.jpeg">
    <img src="g14.jpeg">
    <img src="g15.jpeg">
    <img src="g16.jpeg">
    <img src="g17.jpeg">
    <img src="g18.jpeg">
</div>

</body>
</html>
